<section class="section profile" id="profile">
  <header class="header">
    <div class="container">
      <div class="header__wrapper">
        <h1 class="header__title">प्रोफ़ाइल</h1>
        <div class="header__btns">
          <button type="button" data-id="search" class="header__btn nav__trigger">
            <img src="img/search-icon.png" alt="" />
          </button>
          <button type="button" data-id="shop" class="header__btn nav__trigger">
            <img src="img/burger-icon.png" alt="" />
          </button>
        </div>
      </div>
    </div>
  </header>
  <div class="profile__main">
    <div class="container">
      <div class="profile__main-wrapper">
        <div class="profile__info">
          <img src="img/home-reals-icon-5.png" alt="" class="profile__img" />
          <div class="profile__info-item">
            <h3>128</h3>
            <p>पदों</p>
          </div>
          <div class="profile__info-item">
            <h3>127k</h3>
            <p>ग्राहकों</p>
          </div>
          <div class="profile__info-item">
            <h3>14 K</h3>
            <p>समीक्षा</p>
          </div>
        </div>
        <div class="profile__text">
          <h3>तंत्र मैक्स</h3>
          <p>पुरुष शक्ति के लिए आयुर्वेदिक परिसर</p>
        </div>
        <div class="profile__btns">
          <button type="button" data-id="shop" class="profile__btn profile__btn-1 nav__trigger">सदस्यता लें</button>
          <button type="button" class="profile__btn profile__btn-2 profile__share-btn">शेयर करना</button>
        </div>
        <div class="home__reals-items">
          <button type="button" data-modal="1" class="home__reals-item open__modal">
            <img src="img/home-reals-icon-1.png" alt="" />
            <span>ऊर्जा</span>
          </button>
          <button type="button" data-modal="2" class="home__reals-item open__modal">
            <img src="img/home-reals-icon-2.png" alt="" />
            <span>जोड़ा</span>
          </button>
          <button type="button" data-modal="3" class="home__reals-item open__modal">
            <img src="img/home-reals-icon-3.png" alt="" />
            <span>पत्नी</span>
          </button>
          <button type="button" data-modal="4" class="home__reals-item open__modal">
            <img src="img/home-reals-icon-4.png" alt="" />
            <span>विशेषज्ञों</span>
          </button>
          <button type="button" data-modal="5" class="home__reals-item open__modal">
            <img src="img/home-reals-icon-5.png" alt="" />
            <span>छूट</span>
          </button>
        </div>
        <div class="search__items">
          <img src="img/search/1.jpg" alt="" class="search__item-img" />
          <img src="img/search/2.jpg" alt="" class="search__item-img" />
          <img src="img/search/3.jpg" alt="" class="search__item-img" />
          <img src="img/search/5.jpg" alt="" class="search__item-img" />
          <img src="img/search/6.jpg" alt="" class="search__item-img" />
          <img src="img/search/7.jpg" alt="" class="search__item-img" />
          <img src="img/search/8.jpg" alt="" class="search__item-img" />
          <img src="img/search/9.jpg" alt="" class="search__item-img" />
          <img src="img/search/4.jpg" alt="" class="search__item-img" />
        </div>
        <div class="share__block" id="share">
          <div class="container">
            <div class="share__block-wrapper">
              <div class="comment__block-title">
                <h3>शेयर करना</h3>
                <button type="button" class="share__block-close">
                  <img src="img/close.png" alt="" />
                </button>
              </div>
              <div class="share__btns">
                <button type="button" data-id="shop" class="share__btn nav__trigger">
                  <div class="share__btn-icon">
                    <img src="img/share-icon-1.png" alt="" />
                  </div>
                  <span>WHATSAPP</span>
                </button>
                <button type="button" data-id="shop" class="share__btn nav__trigger">
                  <div class="share__btn-icon">
                    <img src="img/share-icon-2.png" alt="" />
                  </div>
                  <span>टेलीग्राम</span>
                </button>
                <button type="button" data-id="shop" class="share__btn nav__trigger">
                  <div class="share__btn-icon">
                    <img src="img/share-icon-3.png" alt="" />
                  </div>
                  <span>संदेश</span>
                </button>
                <button type="button" data-id="shop" class="share__btn nav__trigger">
                  <div class="share__btn-icon">
                    <img src="img/share-icon-4.png" alt="" />
                  </div>
                  <span>प्रतिलिपि</span>
                </button>
                <button type="button" data-id="shop" class="share__btn nav__trigger">
                  <div class="share__btn-icon">
                    <img src="img/share-icon-5.png" alt="" />
                  </div>
                  <span>अधिक</span>
                </button>
              </div>
              <button type="button" data-id="shop" class="share__main-btn nav__trigger">रद्द करना</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
